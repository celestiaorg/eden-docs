name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        for attempt in 1 2 3; do
          yarn install --frozen-lockfile --network-timeout 300000 && exit 0
          if [ "$attempt" -lt 3 ]; then
            echo "yarn install failed (attempt $attempt/3), retrying in 15 seconds..."
            sleep 15
          fi
        done
        echo "yarn install failed after 3 attempts"
        exit 1

    - name: Run ESLint
      run: npx eslint . --ext .js,.jsx,.ts,.tsx,.mdx --max-warnings 0

    - name: Run TypeScript type checking
      run: npx tsc --noEmit

    - name: Run Prettier check
      run: npx prettier --check "**/*.{js,jsx,ts,tsx,mdx,json,css,md}"
