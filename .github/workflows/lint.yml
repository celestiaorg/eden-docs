name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run ESLint
      run: bunx eslint . --ext .js,.jsx,.ts,.tsx,.mdx --max-warnings 0

    - name: Run TypeScript type checking
      run: bunx tsc --noEmit

    - name: Run Prettier check
      run: bunx prettier --check "**/*.{js,jsx,ts,tsx,mdx,json,css,md}"