name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run ESLint
      run: npx eslint . --ext .js,.jsx,.ts,.tsx,.mdx --max-warnings 0

    - name: Run TypeScript type checking
      run: npx tsc --noEmit

    - name: Run Prettier check
      run: npx prettier --check "**/*.{js,jsx,ts,tsx,mdx,json,css,md}"