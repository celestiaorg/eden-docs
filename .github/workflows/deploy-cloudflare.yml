# The only deploy: serves the full static site AND the /mcp endpoint from one
# origin (docs.eden.zone). Requires CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID repo secrets.
#
# Pushes to main deploy to production; pull requests deploy a Pages preview
# at <branch>.eden-docs.pages.dev (secrets are unavailable on fork PRs, so
# preview deploys only run for same-repo branches).
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Vocs base URL
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [[ "$branch" == "main" ]]; then
            echo "VOCS_BASE_URL=https://docs.eden.zone" >> "$GITHUB_ENV"
          else
            alias="$(printf '%s' "$branch" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]/-/g')"
            echo "VOCS_BASE_URL=https://${alias}.eden-docs.pages.dev" >> "$GITHUB_ENV"
          fi

      - name: Build site (full-static Pages artifact)
        run: bun run build

      - name: Verify Pages artifact
        run: |
          test -f dist/public/_worker.js
          test -f dist/public/why-eden.md

      # On main this is the production deploy; any other branch name creates
      # a preview deployment at <branch>.eden-docs.pages.dev.
      - name: Deploy
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch ${{ github.head_ref || github.ref_name }}
